<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8b0a0"/>
      <stop offset="100%" stop-color="#a8a090"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a8478"/>
      <stop offset="100%" stop-color="#7a7468"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#a8a090"/>
  <rect width="400" height="28" fill="#989080"/>
  <!-- ceiling tiles (old) -->
  <g stroke="#8a8478" stroke-width="1" opacity="0.5">
    <line x1="0" y1="28" x2="400" y2="28"/>
    <line x1="100" y1="0" x2="100" y2="28"/>
    <line x1="200" y1="0" x2="200" y2="28"/>
    <line x1="300" y1="0" x2="300" y2="28"/>
  </g>
  <!-- fluorescent light -->
  <rect x="80" y="24" width="120" height="8" fill="#d0d4c8" rx="1"/>
  <rect x="82" y="25" width="116" height="6" fill="#e0e4d8" opacity="0.9"/>
  <!-- wall -->
  <rect x="0" y="28" width="400" height="195" fill="url(#wall)"/>
  <!-- wall scuffs -->
  <rect x="0" y="28" width="400" height="195" fill="none"/>
  <ellipse cx="300" cy="100" rx="15" ry="8" fill="#9a9284" opacity="0.5"/>
  <ellipse cx="80" cy="150" rx="10" ry="6" fill="#9a9284" opacity="0.4"/>
  <!-- old window blinds -->
  <rect x="50" y="48" width="120" height="110" fill="#c8c4b8" rx="2"/>
  <g stroke="#b8b4a8" stroke-width="1.5">
    <line x1="50" y1="65" x2="170" y2="65"/>
    <line x1="50" y1="78" x2="170" y2="78"/>
    <line x1="50" y1="91" x2="170" y2="91"/>
    <line x1="50" y1="104" x2="170" y2="104"/>
    <line x1="50" y1="117" x2="170" y2="117"/>
    <line x1="50" y1="130" x2="170" y2="130"/>
    <line x1="50" y1="143" x2="170" y2="143"/>
  </g>
  <!-- cardboard boxes on floor -->
  <rect x="240" y="175" width="55" height="45" fill="#c8b888" rx="2"/>
  <rect x="242" y="177" width="51" height="2" fill="#b8a878"/>
  <line x1="267" y1="175" x2="267" y2="220" stroke="#b8a878" stroke-width="1"/>
  <rect x="305" y="185" width="45" height="35" fill="#c0b080" rx="2"/>
  <rect x="307" y="187" width="41" height="2" fill="#b0a070"/>
  <!-- old desk (empty, worn) -->
  <rect x="0" y="195" width="200" height="8" fill="#9a8870" rx="1"/>
  <rect x="0" y="203" width="6" height="97" fill="#8a7860"/>
  <rect x="193" y="203" width="6" height="97" fill="#8a7860"/>
  <!-- floor -->
  <rect x="0" y="220" width="400" height="80" fill="url(#floor)"/>
  <!-- label -->
  <rect x="8" y="8" width="116" height="26" fill="rgba(0,0,0,0.65)" rx="13"/>
  <text x="66" y="25" fill="#e8d0a0" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle">오피스 시공 전</text>
</svg>
