<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf6f0"/>
      <stop offset="100%" stop-color="#f0ebe3"/>
    </linearGradient>
    <linearGradient id="counter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e0d4"/>
      <stop offset="100%" stop-color="#d4cbbf"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#faf6f0"/>
  <!-- wall -->
  <rect x="0" y="30" width="400" height="200" fill="url(#wall)"/>
  <!-- floor — warm terracotta tile -->
  <rect x="0" y="230" width="400" height="70" fill="#d4a87a"/>
  <!-- tile lines -->
  <line x1="0" y1="252" x2="400" y2="252" stroke="#c09060" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="274" x2="400" y2="274" stroke="#c09060" stroke-width="1" opacity="0.5"/>
  <line x1="60" y1="230" x2="60" y2="300" stroke="#c09060" stroke-width="1" opacity="0.4"/>
  <line x1="120" y1="230" x2="120" y2="300" stroke="#c09060" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="230" x2="200" y2="300" stroke="#c09060" stroke-width="1" opacity="0.4"/>
  <line x1="280" y1="230" x2="280" y2="300" stroke="#c09060" stroke-width="1" opacity="0.4"/>
  <line x1="340" y1="230" x2="340" y2="300" stroke="#c09060" stroke-width="1" opacity="0.4"/>
  <!-- modern counter -->
  <rect x="0" y="178" width="170" height="55" fill="url(#counter)" rx="4"/>
  <rect x="0" y="170" width="170" height="12" fill="#c8b9a8" rx="3"/>
  <!-- counter face -->
  <rect x="2" y="180" width="166" height="51" fill="#e0d4c4" rx="3"/>
  <!-- espresso machine silhouette -->
  <rect x="20" y="140" width="50" height="38" fill="#4a5a6a" rx="4"/>
  <rect x="25" y="133" width="40" height="10" fill="#3a4a5a" rx="2"/>
  <circle cx="45" cy="151" r="10" fill="#2a3a4a"/>
  <circle cx="45" cy="151" r="7" fill="#3a4a5a"/>
  <!-- modern shelf -->
  <rect x="195" y="70" width="190" height="10" fill="#c8b09a" rx="2"/>
  <rect x="215" y="52" width="6" height="18" fill="#b89a84"/>
  <rect x="367" y="52" width="6" height="18" fill="#b89a84"/>
  <!-- plants on shelf -->
  <ellipse cx="235" cy="52" rx="12" ry="16" fill="#6a8c5a"/>
  <rect x="232" y="60" width="6" height="10" fill="#8a7060"/>
  <ellipse cx="300" cy="48" rx="16" ry="20" fill="#5a7a4a"/>
  <rect x="297" y="58" width="6" height="12" fill="#8a7060"/>
  <ellipse cx="355" cy="54" rx="10" ry="14" fill="#7a9a6a"/>
  <rect x="352" y="62" width="6" height="8" fill="#8a7060"/>
  <!-- pendant lights -->
  <line x1="120" y1="30" x2="120" y2="60" stroke="#c8b09a" stroke-width="1.5"/>
  <ellipse cx="120" cy="65" rx="12" ry="8" fill="#e8d4b0"/>
  <line x1="240" y1="30" x2="240" y2="55" stroke="#c8b09a" stroke-width="1.5"/>
  <ellipse cx="240" cy="60" rx="12" ry="8" fill="#e8d4b0"/>
  <!-- label -->
  <rect x="8" y="8" width="78" height="26" fill="rgba(30,80,50,0.85)" rx="13"/>
  <text x="47" y="25" fill="#ffffff" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle">카페 완성</text>
</svg>
