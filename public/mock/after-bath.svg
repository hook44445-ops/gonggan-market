<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f6f4"/>
      <stop offset="100%" stop-color="#ede9e4"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8d4ce"/>
      <stop offset="100%" stop-color="#c8c4bc"/>
    </linearGradient>
    <linearGradient id="tub" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f8f8"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#f8f6f4"/>
  <!-- wall — large marble-look tiles -->
  <rect x="0" y="0" width="400" height="230" fill="url(#wall)"/>
  <!-- marble veins -->
  <path d="M 60 40 Q 100 80 80 130 Q 110 160 90 200" stroke="#d8d4cc" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 200 20 Q 220 70 210 110 Q 240 140 220 190" stroke="#d8d4cc" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 320 50 Q 340 90 330 150" stroke="#d8d4cc" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- large tile grid -->
  <g stroke="#e0dcd6" stroke-width="1" opacity="0.7">
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="133" y1="0" x2="133" y2="230"/>
    <line x1="266" y1="0" x2="266" y2="230"/>
  </g>
  <!-- floor — small hex tiles -->
  <rect x="0" y="230" width="400" height="70" fill="url(#floor)"/>
  <g stroke="#b8b4ac" stroke-width="0.8" opacity="0.5">
    <line x1="0" y1="250" x2="400" y2="250"/>
    <line x1="0" y1="270" x2="400" y2="270"/>
    <line x1="0" y1="290" x2="400" y2="290"/>
    <line x1="40" y1="230" x2="40" y2="300"/>
    <line x1="80" y1="230" x2="80" y2="300"/>
    <line x1="120" y1="230" x2="120" y2="300"/>
    <line x1="160" y1="230" x2="160" y2="300"/>
    <line x1="200" y1="230" x2="200" y2="300"/>
    <line x1="240" y1="230" x2="240" y2="300"/>
    <line x1="280" y1="230" x2="280" y2="300"/>
    <line x1="320" y1="230" x2="320" y2="300"/>
    <line x1="360" y1="230" x2="360" y2="300"/>
  </g>
  <!-- modern freestanding tub -->
  <ellipse cx="300" cy="200" rx="88" ry="32" fill="url(#tub)"/>
  <ellipse cx="300" cy="200" rx="80" ry="25" fill="#f0f0f0"/>
  <ellipse cx="300" cy="200" rx="74" ry="20" fill="#e8f0f4"/>
  <!-- tub feet -->
  <rect x="228" y="224" width="6" height="8" fill="#c0b8b0" rx="2"/>
  <rect x="365" y="224" width="6" height="8" fill="#c0b8b0" rx="2"/>
  <!-- chrome faucet -->
  <rect x="370" y="175" width="4" height="22" fill="#c8c8d0" rx="2"/>
  <rect x="365" y="172" width="14" height="5" fill="#d0d0d8" rx="2"/>
  <!-- large frameless mirror -->
  <rect x="40" y="30" width="110" height="90" fill="#c8d8e0" rx="3" opacity="0.8"/>
  <rect x="40" y="30" width="110" height="90" fill="none" stroke="#e8e4de" stroke-width="3" rx="3"/>
  <!-- wall sconce light -->
  <rect x="88" y="25" width="14" height="8" fill="#e8e0d0" rx="3"/>
  <ellipse cx="95" cy="25" rx="5" ry="3" fill="#fff8e0" opacity="0.9"/>
  <!-- plant -->
  <rect x="22" y="198" width="20" height="32" fill="#8a7a6a" rx="4"/>
  <ellipse cx="32" cy="195" rx="18" ry="22" fill="#5a7a4a"/>
  <ellipse cx="22" cy="185" rx="12" ry="16" fill="#4a6a3a"/>
  <!-- label -->
  <rect x="8" y="8" width="78" height="26" fill="rgba(30,80,50,0.85)" rx="13"/>
  <text x="47" y="25" fill="#ffffff" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle">욕실 완성</text>
</svg>
