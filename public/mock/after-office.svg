<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4f4f2"/>
      <stop offset="100%" stop-color="#eceae6"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8d4ce"/>
      <stop offset="100%" stop-color="#c8c4bc"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e4de"/>
      <stop offset="100%" stop-color="#d8d4cc"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#f4f4f2"/>
  <!-- ceiling -->
  <rect width="400" height="30" fill="#eceae6"/>
  <!-- recessed lighting -->
  <circle cx="100" cy="15" r="6" fill="#fff8e0" opacity="0.95"/>
  <circle cx="100" cy="15" r="10" fill="#fff8e0" opacity="0.3"/>
  <circle cx="200" cy="15" r="6" fill="#fff8e0" opacity="0.95"/>
  <circle cx="200" cy="15" r="10" fill="#fff8e0" opacity="0.3"/>
  <circle cx="300" cy="15" r="6" fill="#fff8e0" opacity="0.95"/>
  <circle cx="300" cy="15" r="10" fill="#fff8e0" opacity="0.3"/>
  <!-- wall -->
  <rect x="0" y="30" width="400" height="195" fill="url(#wall)"/>
  <!-- accent wall panel -->
  <rect x="0" y="30" width="10" height="195" fill="#2e5f4b" opacity="0.8"/>
  <!-- large window with blind (clean) -->
  <rect x="50" y="48" width="130" height="130" fill="#c8e0ec" rx="4"/>
  <rect x="52" y="50" width="126" height="126" fill="#d0e8f4" opacity="0.7"/>
  <!-- window frame -->
  <rect x="48" y="46" width="134" height="134" fill="none" stroke="#d8d4ce" stroke-width="4" rx="4"/>
  <line x1="116" y1="50" x2="116" y2="176" stroke="#d8d4ce" stroke-width="2"/>
  <!-- modern desk -->
  <rect x="20" y="188" width="230" height="10" fill="url(#desk)" rx="3"/>
  <rect x="20" y="198" width="4" height="82" fill="#c8c4bc" rx="2"/>
  <rect x="244" y="198" width="4" height="82" fill="#c8c4bc" rx="2"/>
  <!-- monitor -->
  <rect x="70" y="148" width="80" height="48" fill="#2a3a4a" rx="4"/>
  <rect x="72" y="150" width="76" height="44" fill="#1a2a3a" rx="3"/>
  <rect x="74" y="152" width="72" height="38" fill="#0a1a2a" rx="2"/>
  <!-- screen glow -->
  <rect x="75" y="153" width="70" height="36" fill="#1a3a6a" opacity="0.6" rx="2"/>
  <rect x="104" y="196" width="22" height="6" fill="#2a3a4a" rx="1"/>
  <!-- partition -->
  <rect x="278" y="60" width="8" height="165" fill="#d8d4ce" rx="3"/>
  <!-- chair silhouette -->
  <ellipse cx="130" cy="228" rx="30" ry="8" fill="#c8c4bc" opacity="0.5"/>
  <rect x="115" y="215" width="30" height="15" fill="#8a9e8a" rx="4"/>
  <!-- floor -->
  <rect x="0" y="225" width="400" height="75" fill="url(#floor)"/>
  <!-- floor tile lines -->
  <g stroke="#c0bbb4" stroke-width="0.8" opacity="0.5">
    <line x1="0" y1="250" x2="400" y2="250"/>
    <line x1="0" y1="275" x2="400" y2="275"/>
    <line x1="80" y1="225" x2="80" y2="300"/>
    <line x1="200" y1="225" x2="200" y2="300"/>
    <line x1="320" y1="225" x2="320" y2="300"/>
  </g>
  <!-- label -->
  <rect x="18" y="8" width="100" height="26" fill="rgba(30,80,50,0.85)" rx="13"/>
  <text x="68" y="25" fill="#ffffff" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle">오피스 완성</text>
</svg>
