<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b5c48"/>
      <stop offset="100%" stop-color="#5a4a38"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a3828"/>
      <stop offset="100%" stop-color="#3a2818"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#4a3c2c"/>
  <!-- ceiling -->
  <rect width="400" height="35" fill="#3a2e20"/>
  <!-- wall -->
  <rect x="0" y="35" width="400" height="195" fill="url(#wall)"/>
  <!-- floor -->
  <rect x="0" y="230" width="400" height="70" fill="url(#floor)"/>
  <!-- old counter -->
  <rect x="0" y="175" width="160" height="55" fill="#4a3828" rx="2"/>
  <rect x="0" y="168" width="160" height="12" fill="#5a4838" rx="2"/>
  <!-- counter stains -->
  <ellipse cx="60" cy="180" rx="20" ry="8" fill="#3a2818" opacity="0.5"/>
  <!-- old shelf -->
  <rect x="200" y="75" width="180" height="12" fill="#5a4838" rx="2"/>
  <rect x="220" y="57" width="8" height="18" fill="#4a3828"/>
  <rect x="360" y="57" width="8" height="18" fill="#4a3828"/>
  <!-- old bottles/items on shelf (blobs) -->
  <rect x="230" y="55" width="15" height="22" fill="#6a7a5a" rx="2"/>
  <rect x="252" y="58" width="12" height="19" fill="#8a7a5a" rx="2"/>
  <rect x="270" y="52" width="18" height="25" fill="#5a6a4a" rx="3"/>
  <rect x="295" y="60" width="10" height="17" fill="#7a6a4a" rx="2"/>
  <!-- old light fixture -->
  <line x1="200" y1="35" x2="200" y2="65" stroke="#3a2e20" stroke-width="2"/>
  <rect x="182" y="62" width="36" height="14" fill="#5a5040" rx="3"/>
  <!-- crack on wall -->
  <path d="M 310 80 L 318 100 L 324 90 L 330 120" stroke="#4a3c2c" stroke-width="1.5" fill="none" opacity="0.7"/>
  <!-- label -->
  <rect x="8" y="8" width="100" height="26" fill="rgba(0,0,0,0.65)" rx="13"/>
  <text x="58" y="25" fill="#e8d0a0" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle">카페 시공 전</text>
</svg>
