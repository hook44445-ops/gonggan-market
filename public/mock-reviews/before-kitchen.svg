<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c0b080"/>
      <stop offset="100%" stop-color="#aa9a68"/>
    </linearGradient>
    <linearGradient id="cab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a6a40"/>
      <stop offset="100%" stop-color="#7a5a30"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a8860"/>
      <stop offset="100%" stop-color="#7a6840"/>
    </linearGradient>
  </defs>
  <!-- ceiling -->
  <rect width="400" height="300" fill="#a89870"/>
  <rect width="400" height="30" fill="#9a8860"/>
  <!-- yellowed wall -->
  <rect x="0" y="30" width="400" height="205" fill="url(#wall)"/>
  <!-- grease stain on wall -->
  <ellipse cx="200" cy="120" rx="40" ry="20" fill="#9a8850" opacity="0.4"/>
  <!-- upper cabinets (dark brown) -->
  <rect x="0" y="42" width="400" height="85" fill="url(#cab)" rx="2"/>
  <line x1="100" y1="42" x2="100" y2="127" stroke="#6a4a28" stroke-width="2"/>
  <line x1="200" y1="42" x2="200" y2="127" stroke="#6a4a28" stroke-width="2"/>
  <line x1="300" y1="42" x2="300" y2="127" stroke="#6a4a28" stroke-width="2"/>
  <!-- cabinet doors panels -->
  <rect x="5" y="47" width="88" height="74" fill="#9a7a50" rx="1"/>
  <rect x="105" y="47" width="88" height="74" fill="#9a7a50" rx="1"/>
  <rect x="205" y="47" width="88" height="74" fill="#9a7a50" rx="1"/>
  <rect x="305" y="47" width="88" height="74" fill="#9a7a50" rx="1"/>
  <!-- old knob handles -->
  <circle cx="49" cy="85" r="6" fill="#6a5030"/>
  <circle cx="149" cy="85" r="6" fill="#6a5030"/>
  <circle cx="249" cy="85" r="6" fill="#6a5030"/>
  <circle cx="349" cy="85" r="6" fill="#6a5030"/>
  <!-- old backsplash tiles (yellowed) -->
  <rect x="0" y="175" width="400" height="42" fill="#c8b078"/>
  <g stroke="#a89050" stroke-width="1" opacity="0.7">
    <line x1="0" y1="196" x2="400" y2="196"/>
    <line x1="50" y1="175" x2="50" y2="217"/>
    <line x1="100" y1="175" x2="100" y2="217"/>
    <line x1="150" y1="175" x2="150" y2="217"/>
    <line x1="200" y1="175" x2="200" y2="217"/>
    <line x1="250" y1="175" x2="250" y2="217"/>
    <line x1="300" y1="175" x2="300" y2="217"/>
    <line x1="350" y1="175" x2="350" y2="217"/>
  </g>
  <!-- stain on backsplash -->
  <ellipse cx="175" cy="185" rx="30" ry="8" fill="#9a8040" opacity="0.45"/>
  <!-- old countertop -->
  <rect x="0" y="163" width="400" height="16" fill="#b09060" rx="2"/>
  <!-- counter scratch -->
  <line x1="80" y1="166" x2="180" y2="172" stroke="#8a7040" stroke-width="1" opacity="0.6"/>
  <!-- lower cabinets -->
  <rect x="0" y="179" width="400" height="121" fill="url(#cab)"/>
  <line x1="100" y1="179" x2="100" y2="300" stroke="#6a4a28" stroke-width="2"/>
  <line x1="200" y1="179" x2="200" y2="300" stroke="#6a4a28" stroke-width="2"/>
  <line x1="300" y1="179" x2="300" y2="300" stroke="#6a4a28" stroke-width="2"/>
  <rect x="5" y="183" width="88" height="112" fill="#9a7a50" rx="1"/>
  <rect x="105" y="183" width="88" height="112" fill="#9a7a50" rx="1"/>
  <rect x="205" y="183" width="88" height="112" fill="#9a7a50" rx="1"/>
  <rect x="305" y="183" width="88" height="112" fill="#9a7a50" rx="1"/>
  <circle cx="49" cy="242" r="6" fill="#6a5030"/>
  <circle cx="149" cy="242" r="6" fill="#6a5030"/>
  <circle cx="249" cy="242" r="6" fill="#6a5030"/>
  <circle cx="349" cy="242" r="6" fill="#6a5030"/>
  <!-- old metal sink -->
  <rect x="130" y="165" width="110" height="18" fill="#8a8878" rx="2"/>
  <rect x="135" y="167" width="100" height="14" fill="#7a7868" rx="2"/>
  <!-- old faucet (tall, dated) -->
  <rect x="188" y="145" width="5" height="22" fill="#8a8070" rx="2"/>
  <rect x="178" y="143" width="26" height="6" fill="#8a8070" rx="2"/>
  <!-- window above sink (small) -->
  <rect x="143" y="65" width="84" height="62" fill="#7a9aaa" rx="2" opacity="0.7"/>
  <rect x="145" y="67" width="80" height="58" fill="#8aacbc" opacity="0.5"/>
  <line x1="186" y1="67" x2="186" y2="125" stroke="#7a6a50" stroke-width="3"/>
  <!-- label -->
  <rect x="8" y="8" width="110" height="26" fill="rgba(0,0,0,0.72)" rx="13"/>
  <text x="63" y="25" fill="#e8c880" font-family="'Apple SD Gothic Neo',sans-serif" font-size="13" font-weight="700" text-anchor="middle">주방 시공 전</text>
</svg>
