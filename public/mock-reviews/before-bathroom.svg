<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c0b08a"/>
      <stop offset="100%" stop-color="#aa9870"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a9080"/>
      <stop offset="100%" stop-color="#7a7060"/>
    </linearGradient>
  </defs>
  <!-- ceiling (damp stained) -->
  <rect width="400" height="300" fill="#a09080"/>
  <rect width="400" height="32" fill="#8a8070"/>
  <!-- damp ceiling stain -->
  <ellipse cx="200" cy="18" rx="80" ry="12" fill="#787060" opacity="0.6"/>
  <ellipse cx="320" cy="22" rx="40" ry="8" fill="#787060" opacity="0.4"/>
  <!-- old tile walls — yellowed -->
  <rect x="0" y="32" width="400" height="200" fill="url(#tile)"/>
  <!-- tile grid -->
  <g stroke="#9a8a68" stroke-width="1.2" opacity="0.7">
    <line x1="0" y1="62" x2="400" y2="62"/>
    <line x1="0" y1="92" x2="400" y2="92"/>
    <line x1="0" y1="122" x2="400" y2="122"/>
    <line x1="0" y1="152" x2="400" y2="152"/>
    <line x1="0" y1="182" x2="400" y2="182"/>
    <line x1="0" y1="212" x2="400" y2="212"/>
    <line x1="50" y1="32" x2="50" y2="232"/>
    <line x1="100" y1="32" x2="100" y2="232"/>
    <line x1="150" y1="32" x2="150" y2="232"/>
    <line x1="200" y1="32" x2="200" y2="232"/>
    <line x1="250" y1="32" x2="250" y2="232"/>
    <line x1="300" y1="32" x2="300" y2="232"/>
    <line x1="350" y1="32" x2="350" y2="232"/>
  </g>
  <!-- mold/stain patches on grout -->
  <rect x="100" y="92" width="50" height="3" fill="#7a7058" opacity="0.6"/>
  <rect x="200" y="122" width="50" height="3" fill="#7a7058" opacity="0.5"/>
  <rect x="50" y="62" width="3" height="30" fill="#7a7058" opacity="0.5"/>
  <ellipse cx="175" cy="160" rx="22" ry="8" fill="#8a7858" opacity="0.45"/>
  <ellipse cx="310" cy="105" rx="15" ry="5" fill="#8a7858" opacity="0.4"/>
  <!-- old bathtub -->
  <rect x="220" y="162" width="170" height="70" fill="#c0b898" rx="10"/>
  <rect x="228" y="170" width="154" height="55" fill="#aaa078" rx="8"/>
  <!-- bathtub stain ring -->
  <rect x="228" y="195" width="154" height="3" fill="#989070" opacity="0.5"/>
  <!-- rust stain in tub -->
  <ellipse cx="350" cy="205" rx="18" ry="8" fill="#8a7050" opacity="0.5"/>
  <!-- old faucet (rusty) -->
  <rect x="370" y="155" width="6" height="16" fill="#8a7058" rx="2"/>
  <rect x="360" y="153" width="26" height="7" fill="#8a7058" rx="2"/>
  <!-- rusty old knobs -->
  <circle cx="358" cy="156" r="5" fill="#7a6048"/>
  <circle cx="388" cy="156" r="5" fill="#7a6048"/>
  <!-- old mirror (yellowed frame) -->
  <rect x="48" y="45" width="100" height="80" fill="#b0a888" rx="3"/>
  <rect x="52" y="49" width="92" height="72" fill="#c8c0a0" opacity="0.65"/>
  <!-- mirror rust spots -->
  <circle cx="58" cy="56" r="4" fill="#9a8a60" opacity="0.7"/>
  <circle cx="140" cy="118" r="3" fill="#9a8a60" opacity="0.6"/>
  <!-- old sink -->
  <rect x="48" y="185" width="100" height="50" fill="#b0a888" rx="4"/>
  <ellipse cx="98" cy="202" rx="30" ry="16" fill="#9a9278" opacity="0.8"/>
  <!-- sink drain stain -->
  <ellipse cx="98" cy="202" rx="8" ry="5" fill="#7a6a4a" opacity="0.6"/>
  <!-- floor (old slippery tiles) -->
  <rect x="0" y="232" width="400" height="68" fill="url(#floor)"/>
  <g stroke="#6a6050" stroke-width="1" opacity="0.5">
    <line x1="0" y1="250" x2="400" y2="250"/>
    <line x1="0" y1="270" x2="400" y2="270"/>
    <line x1="0" y1="290" x2="400" y2="290"/>
    <line x1="50" y1="232" x2="50" y2="300"/>
    <line x1="100" y1="232" x2="100" y2="300"/>
    <line x1="150" y1="232" x2="150" y2="300"/>
    <line x1="200" y1="232" x2="200" y2="300"/>
    <line x1="250" y1="232" x2="250" y2="300"/>
    <line x1="300" y1="232" x2="300" y2="300"/>
    <line x1="350" y1="232" x2="350" y2="300"/>
  </g>
  <!-- label -->
  <rect x="8" y="8" width="110" height="26" fill="rgba(0,0,0,0.72)" rx="13"/>
  <text x="63" y="25" fill="#e8c880" font-family="'Apple SD Gothic Neo',sans-serif" font-size="13" font-weight="700" text-anchor="middle">욕실 시공 전</text>
</svg>
