<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4035"/>
      <stop offset="45%" stop-color="#6a5c4a"/>
      <stop offset="100%" stop-color="#3a2e20"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a3820"/>
      <stop offset="100%" stop-color="#2e2010"/>
    </linearGradient>
    <filter id="worn">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="multiply" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>
  <!-- ceiling -->
  <rect width="400" height="300" fill="#3a3228"/>
  <!-- wall background -->
  <rect x="0" y="30" width="400" height="200" fill="url(#bg)"/>
  <!-- wall texture overlay -->
  <rect x="0" y="30" width="400" height="200" fill="#6a5c4a" filter="url(#worn)" opacity="0.4"/>
  <!-- water stain patches -->
  <ellipse cx="320" cy="80" rx="30" ry="20" fill="#5a4c3a" opacity="0.6"/>
  <ellipse cx="80" cy="130" rx="20" ry="14" fill="#5a4c3a" opacity="0.5"/>
  <!-- old wallpaper lines (horizontal striping) -->
  <rect x="0" y="55" width="400" height="2" fill="#58503e" opacity="0.5"/>
  <rect x="0" y="80" width="400" height="2" fill="#58503e" opacity="0.4"/>
  <rect x="0" y="105" width="400" height="2" fill="#58503e" opacity="0.5"/>
  <rect x="0" y="130" width="400" height="2" fill="#58503e" opacity="0.4"/>
  <rect x="0" y="155" width="400" height="2" fill="#58503e" opacity="0.5"/>
  <rect x="0" y="180" width="400" height="2" fill="#58503e" opacity="0.4"/>
  <!-- small grimy window -->
  <rect x="50" y="55" width="110" height="90" fill="#4a6070" rx="3"/>
  <rect x="53" y="58" width="104" height="84" fill="#5a7a8a" opacity="0.5"/>
  <!-- window grime overlay -->
  <rect x="50" y="55" width="110" height="90" fill="#3a3228" opacity="0.45" rx="3"/>
  <line x1="106" y1="58" x2="106" y2="142" stroke="#3a2e20" stroke-width="4"/>
  <line x1="53" y1="100" x2="157" y2="100" stroke="#3a2e20" stroke-width="4"/>
  <!-- old curtain (droopy) -->
  <path d="M 40 55 Q 55 80 50 142 L 40 142 Z" fill="#5a4838" opacity="0.9"/>
  <path d="M 172 55 Q 157 80 162 142 L 172 142 Z" fill="#5a4838" opacity="0.9"/>
  <!-- floor -->
  <rect x="0" y="230" width="400" height="70" fill="url(#floor)"/>
  <!-- floor scratch lines -->
  <line x1="0" y1="240" x2="180" y2="244" stroke="#2a1a0a" stroke-width="1" opacity="0.7"/>
  <line x1="50" y1="252" x2="260" y2="255" stroke="#2a1a0a" stroke-width="1" opacity="0.6"/>
  <line x1="200" y1="262" x2="400" y2="265" stroke="#2a1a0a" stroke-width="1" opacity="0.5"/>
  <!-- worn sofa -->
  <rect x="210" y="180" width="175" height="55" fill="#4a3c2c" rx="6"/>
  <rect x="210" y="168" width="175" height="18" fill="#5a4a38" rx="5"/>
  <rect x="210" y="180" width="22" height="55" fill="#3a2e20" rx="4"/>
  <rect x="363" y="180" width="22" height="55" fill="#3a2e20" rx="4"/>
  <!-- sofa worn patches -->
  <ellipse cx="285" cy="198" rx="18" ry="10" fill="#3a2e20" opacity="0.35"/>
  <ellipse cx="340" cy="205" rx="14" ry="8" fill="#3a2e20" opacity="0.3"/>
  <!-- old coffee table -->
  <rect x="200" y="226" width="80" height="6" fill="#4a3820" rx="2"/>
  <rect x="203" y="232" width="4" height="28" fill="#3a2e20"/>
  <rect x="273" y="232" width="4" height="28" fill="#3a2e20"/>
  <!-- crack on wall -->
  <path d="M 250 85 L 255 105 L 252 115 L 258 140" stroke="#3a3028" stroke-width="1.5" fill="none" opacity="0.8"/>
  <!-- dark label -->
  <rect x="8" y="8" width="116" height="26" fill="rgba(0,0,0,0.72)" rx="13"/>
  <text x="66" y="25" fill="#e8c880" font-family="'Apple SD Gothic Neo',sans-serif" font-size="13" font-weight="700" text-anchor="middle">아파트 시공 전</text>
</svg>
