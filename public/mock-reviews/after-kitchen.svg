<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f6f2"/>
      <stop offset="100%" stop-color="#f0ece6"/>
    </linearGradient>
    <linearGradient id="cab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f7f5"/>
      <stop offset="100%" stop-color="#edebe7"/>
    </linearGradient>
    <linearGradient id="counter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4d0ca"/>
      <stop offset="100%" stop-color="#c4c0ba"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e0d4"/>
      <stop offset="100%" stop-color="#d8d0c4"/>
    </linearGradient>
  </defs>
  <!-- wall clean white -->
  <rect width="400" height="300" fill="url(#wall)"/>
  <rect width="400" height="30" fill="#f8f6f2"/>
  <!-- upper white cabinets -->
  <rect x="0" y="38" width="400" height="90" fill="url(#cab)" rx="3"/>
  <rect x="0" y="38" width="400" height="90" fill="none" stroke="#e8e4de" stroke-width="1.5" rx="3"/>
  <line x1="100" y1="38" x2="100" y2="128" stroke="#e0dcd6" stroke-width="1.5"/>
  <line x1="200" y1="38" x2="200" y2="128" stroke="#e0dcd6" stroke-width="1.5"/>
  <line x1="300" y1="38" x2="300" y2="128" stroke="#e0dcd6" stroke-width="1.5"/>
  <!-- slim bar handles -->
  <rect x="28" y="90" width="44" height="3.5" fill="#b8b4ae" rx="1.8"/>
  <rect x="128" y="90" width="44" height="3.5" fill="#b8b4ae" rx="1.8"/>
  <rect x="228" y="90" width="44" height="3.5" fill="#b8b4ae" rx="1.8"/>
  <rect x="328" y="90" width="44" height="3.5" fill="#b8b4ae" rx="1.8"/>
  <!-- under-cabinet lighting glow -->
  <rect x="0" y="124" width="400" height="8" fill="#fff4d0" opacity="0.6"/>
  <!-- subway tile backsplash (white) -->
  <rect x="0" y="173" width="400" height="44" fill="#f4f4f4"/>
  <g stroke="#e0dcd8" stroke-width="1" opacity="0.8">
    <line x1="0" y1="186" x2="400" y2="186"/>
    <line x1="0" y1="199" x2="400" y2="199"/>
    <line x1="0" y1="212" x2="400" y2="212"/>
    <line x1="30" y1="173" x2="30" y2="217"/>
    <line x1="90" y1="173" x2="90" y2="217"/>
    <line x1="150" y1="173" x2="150" y2="217"/>
    <line x1="210" y1="173" x2="210" y2="217"/>
    <line x1="270" y1="173" x2="270" y2="217"/>
    <line x1="330" y1="173" x2="330" y2="217"/>
    <line x1="390" y1="173" x2="390" y2="217"/>
  </g>
  <!-- quartz countertop -->
  <rect x="0" y="163" width="400" height="14" fill="url(#counter)" rx="2"/>
  <!-- quartz veins -->
  <path d="M 60 164 Q 90 170 78 176" stroke="#c0bbb4" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 280 165 Q 310 171 298 177" stroke="#c0bbb4" stroke-width="0.8" fill="none" opacity="0.4"/>
  <!-- undermount sink (modern) -->
  <rect x="145" y="165" width="100" height="20" fill="#9ab0ba" rx="3"/>
  <rect x="150" y="167" width="90" height="16" fill="#88a0aa" rx="2"/>
  <!-- modern arc faucet -->
  <rect x="198" y="146" width="5" height="20" fill="#c0c4c8" rx="2"/>
  <path d="M 200 146 Q 212 136 216 150" stroke="#c0c4c8" stroke-width="4" fill="none" stroke-linecap="round"/>
  <circle cx="216" cy="152" r="3.5" fill="#c8ccd0"/>
  <!-- lower white cabinets -->
  <rect x="0" y="177" width="400" height="123" fill="url(#cab)"/>
  <rect x="0" y="177" width="400" height="123" fill="none" stroke="#e8e4de" stroke-width="1.5"/>
  <line x1="100" y1="177" x2="100" y2="300" stroke="#e0dcd6" stroke-width="1.5"/>
  <line x1="200" y1="177" x2="200" y2="300" stroke="#e0dcd6" stroke-width="1.5"/>
  <line x1="300" y1="177" x2="300" y2="300" stroke="#e0dcd6" stroke-width="1.5"/>
  <rect x="28" y="240" width="44" height="3.5" fill="#b8b4ae" rx="1.8"/>
  <rect x="128" y="240" width="44" height="3.5" fill="#b8b4ae" rx="1.8"/>
  <rect x="228" y="240" width="44" height="3.5" fill="#b8b4ae" rx="1.8"/>
  <rect x="328" y="240" width="44" height="3.5" fill="#b8b4ae" rx="1.8"/>
  <!-- range hood (modern, slim) -->
  <rect x="160" y="30" width="80" height="11" fill="#d0ccc6" rx="2"/>
  <rect x="166" y="41" width="68" height="5" fill="#c0bbb4" rx="1"/>
  <!-- window above counter (large, bright) -->
  <rect x="228" y="42" width="80" height="82" fill="#c8e4f4" rx="4"/>
  <rect x="230" y="44" width="76" height="78" fill="#d4ecfa" opacity="0.7" rx="3"/>
  <line x1="269" y1="44" x2="269" y2="122" stroke="#e0dcd6" stroke-width="2"/>
  <line x1="230" y1="84" x2="306" y2="84" stroke="#e0dcd6" stroke-width="2"/>
  <!-- sunlight on floor from window -->
  <polygon points="228,122 308,122 350,177 200,177" fill="#fffce8" opacity="0.35"/>
  <!-- floor light wood/stone -->
  <rect x="0" y="177" width="0" height="0"/> <!-- placeholder -->
  <!-- green label -->
  <rect x="8" y="8" width="84" height="26" fill="rgba(30,80,50,0.88)" rx="13"/>
  <text x="50" y="25" fill="#ffffff" font-family="'Apple SD Gothic Neo',sans-serif" font-size="13" font-weight="700" text-anchor="middle">주방 완성</text>
</svg>
