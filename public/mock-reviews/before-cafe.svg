<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3028"/>
      <stop offset="100%" stop-color="#4a3e30"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a4a38"/>
      <stop offset="100%" stop-color="#3a2e20"/>
    </linearGradient>
  </defs>
  <!-- ceiling — concrete exposed -->
  <rect width="400" height="300" fill="#2e2820"/>
  <rect width="400" height="40" fill="#3a3228"/>
  <!-- exposed conduit on ceiling -->
  <rect x="0" y="18" width="400" height="5" fill="#4a4438" rx="2"/>
  <rect x="0" y="28" width="200" height="4" fill="#4a4438" rx="2"/>
  <!-- old bare walls -->
  <rect x="0" y="40" width="400" height="195" fill="url(#bg)"/>
  <!-- concrete patches on wall -->
  <rect x="0" y="40" width="400" height="195" fill="none"/>
  <rect x="80" y="60" width="60" height="40" fill="#444038" opacity="0.5"/>
  <rect x="260" y="80" width="80" height="55" fill="#3a3428" opacity="0.45"/>
  <!-- cracks -->
  <path d="M 200 50 L 205 75 L 198 85 L 204 115" stroke="#2a2418" stroke-width="1.5" fill="none" opacity="0.8"/>
  <path d="M 320 60 L 325 90 L 330 80" stroke="#2a2418" stroke-width="1" fill="none" opacity="0.6"/>
  <!-- boarded window (철거 전) -->
  <rect x="50" y="65" width="120" height="90" fill="#4a3c28" rx="2"/>
  <!-- board planks -->
  <line x1="50" y1="95" x2="170" y2="95" stroke="#3a3020" stroke-width="4"/>
  <line x1="50" y1="120" x2="170" y2="120" stroke="#3a3020" stroke-width="4"/>
  <line x1="50" y1="145" x2="170" y2="145" stroke="#3a3020" stroke-width="4"/>
  <!-- diagonal board -->
  <line x1="50" y1="65" x2="170" y2="155" stroke="#3a3020" stroke-width="3" opacity="0.7"/>
  <!-- old signage remnant -->
  <rect x="220" y="55" width="120" height="30" fill="#5a4a38" rx="3" opacity="0.7"/>
  <rect x="225" y="60" width="110" height="20" fill="#4a3a28" rx="2" opacity="0.6"/>
  <!-- old counter structure (bare) -->
  <rect x="0" y="180" width="175" height="55" fill="#4a3c2c" rx="3"/>
  <rect x="0" y="172" width="175" height="12" fill="#5a4a38" rx="2"/>
  <!-- old stool (broken) -->
  <rect x="190" y="195" width="30" height="5" fill="#5a4a38" rx="2"/>
  <rect x="195" y="200" width="3" height="35" fill="#4a3a28"/>
  <rect x="214" y="200" width="3" height="35" fill="#4a3a28"/>
  <!-- floor (old, stained) -->
  <rect x="0" y="235" width="400" height="65" fill="url(#floor)"/>
  <!-- floor stain -->
  <ellipse cx="250" cy="250" rx="35" ry="12" fill="#3a2a18" opacity="0.5"/>
  <ellipse cx="100" cy="258" rx="25" ry="10" fill="#3a2a18" opacity="0.4"/>
  <!-- debris on floor -->
  <rect x="280" y="236" width="18" height="6" fill="#4a3c2c" opacity="0.8" rx="1"/>
  <rect x="310" y="240" width="12" height="5" fill="#4a3c2c" opacity="0.7" rx="1"/>
  <!-- label -->
  <rect x="8" y="8" width="110" height="26" fill="rgba(0,0,0,0.72)" rx="13"/>
  <text x="63" y="25" fill="#e8c880" font-family="'Apple SD Gothic Neo',sans-serif" font-size="13" font-weight="700" text-anchor="middle">카페 시공 전</text>
</svg>
