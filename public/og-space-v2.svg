  <!-- 텍스트 블록 -->
  <text x="460" y="278" font-family="'Pretendard','Apple SD Gothic Neo',sans-serif" font-size="92" font-weight="800" fill="#1D3D2F" letter-spacing="-2">공간마켓</text>
  <text x="463" y="345" font-family="'Pretendard','Apple SD Gothic Neo',sans-serif" font-size="34" font-weight="600" fill="#2E5F4B" letter-spacing="2">공간사이 · Gonggan Market</text>
  <line x1="464" y1="386" x2="700" y2="386" stroke="#C8A15A" stroke-width="4" stroke-linecap="round"/>
