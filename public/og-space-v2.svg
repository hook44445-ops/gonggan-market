<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- 카카오/OG 공유 썸네일 1200x630 — 따뜻한 아이보리 + 딥그린 -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBF7EF"/>
      <stop offset="1" stop-color="#F2EBDA"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 은은한 보타니컬 장식 (우상단) -->
  <g opacity="0.10" transform="translate(980,40)">
    <path d="M60 240 C60 160 60 90 80 20" stroke="#2E5F4B" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M66 160 C26 146 4 110 2 70 C44 76 70 110 66 160 Z" fill="#2E5F4B"/>
    <path d="M70 110 C112 96 134 60 136 20 C94 26 68 60 70 110 Z" fill="#2E5F4B"/>
  </g>

  <!-- 브랜드 아이콘 (01 공간·연결형) -->
  <g transform="translate(120,175)">
    <rect width="280" height="280" rx="64" fill="#2E5F4B"/>
    <g transform="translate(140,140) scale(0.5) translate(-256,-256)">
