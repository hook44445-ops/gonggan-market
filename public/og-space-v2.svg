      <circle cx="106" cy="256" r="20" fill="#B5D4C5"/>
      <circle cx="406" cy="256" r="20" fill="#B5D4C5"/>
      <g stroke="#F5F1EA" stroke-width="22" stroke-linejoin="round" stroke-linecap="round" fill="none">
