<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" preserveAspectRatio="xMidYMid slice">
  <!--
    공간마켓 Landing Hero 배경 — 따뜻한 자연광 인테리어 쇼룸 (고정 내부 asset, 외부/Unsplash 미사용)
    구성: 좌측 = 밝은 빈 여백(텍스트용) / 우측 = 창가 + 우드 라운지 체어 + 화분 + 러그
    톤: 아이보리·샌드·우드, 자연광. (TV/복잡 가구 없음, 차가운 회색 없음)
  -->
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#FBF6EC"/>
      <stop offset="1" stop-color="#F2EAD9"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.86" cy="0.16" r="0.9">
      <stop offset="0" stop-color="#FFF8E6" stop-opacity="0.9"/>
      <stop offset="0.45" stop-color="#FCF2DA" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#FCF2DA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E0CAA2"/>
      <stop offset="1" stop-color="#CDB184"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FCF8EE"/>
      <stop offset="0.55" stop-color="#F4EFE0"/>
      <stop offset="1" stop-color="#ECE4D2"/>
    </linearGradient>
    <linearGradient id="curtain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FBF6EC" stop-opacity="0.75"/>
    </linearGradient>
    <radialGradient id="lightpool" cx="0.5" cy="0.2" r="0.8">
      <stop offset="0" stop-color="#FFF6DF" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#FFF6DF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#9A7B4E" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#9A7B4E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 벽 -->
  <rect width="1200" height="800" fill="url(#wall)"/>

  <!-- 우측 창문 -->
  <g>
    <rect x="838" y="56" width="356" height="552" rx="6" fill="#FBF7EF"/>
    <rect x="854" y="72" width="324" height="520" rx="4" fill="url(#glass)"/>
    <!-- 창 너머 정원/자연 (따뜻한 초록) -->
    <rect x="854" y="330" width="324" height="262" fill="#DDE4C6" opacity="0.6"/>
    <circle cx="1010" cy="250" r="120" fill="#F3EDC9" opacity="0.6"/>
    <circle cx="900" cy="430" r="70" fill="#CBD8A8" opacity="0.45"/>
    <!-- 창틀 멀리언 -->
    <g fill="#FBF7EF">
      <rect x="1010" y="72" width="14" height="520"/>
      <rect x="854" y="318" width="324" height="12"/>
    </g>
    <!-- 시어 커튼 (좌측) -->
    <g fill="url(#curtain)">
      <path d="M854 72 q14 260 0 520 l34 0 q-12 -260 0 -520 Z"/>
      <path d="M912 72 q14 260 0 520 l30 0 q-12 -260 0 -520 Z" opacity="0.78"/>
    </g>
  </g>

  <!-- 바닥 -->
  <rect x="0" y="600" width="1200" height="200" fill="url(#floor)"/>
  <rect x="0" y="600" width="1200" height="10" fill="#C7A875"/>
  <!-- 우드 그레인 -->
  <g stroke="#C2A06C" stroke-width="2.5" opacity="0.45">
    <line x1="170" y1="612" x2="90" y2="800"/>
    <line x1="420" y1="612" x2="380" y2="800"/>
    <line x1="680" y1="612" x2="700" y2="800"/>
    <line x1="930" y1="612" x2="1000" y2="800"/>
    <line x1="1130" y1="612" x2="1190" y2="800"/>
  </g>
  <g stroke="#D6BB8E" stroke-width="1.5" opacity="0.5">
    <line x1="300" y1="612" x2="250" y2="800"/>
    <line x1="560" y1="612" x2="540" y2="800"/>
    <line x1="820" y1="612" x2="860" y2="800"/>
  </g>
  <!-- 창에서 떨어지는 빛 웅덩이 -->
  <polygon points="880,600 1180,600 1140,800 760,800" fill="url(#lightpool)"/>

  <!-- 자연광 글로우 (우상단) -->
  <rect width="1200" height="800" fill="url(#sun)"/>

  <!-- 러그 -->
  <ellipse cx="1010" cy="690" rx="220" ry="44" fill="#E7DAC0" opacity="0.9"/>
  <ellipse cx="1010" cy="690" rx="180" ry="32" fill="none" stroke="#D8C39E" stroke-width="3" opacity="0.7"/>

  <!-- 화분 + 올리브 나무 (창 옆, 우측) -->
  <g transform="translate(58 0)">
    <ellipse cx="752" cy="612" rx="70" ry="16" fill="url(#shadow)"/>
    <path d="M748 556 C740 452 736 372 754 290" stroke="#9A7B53" stroke-width="9" fill="none" stroke-linecap="round"/>
    <path d="M754 350 C772 320 802 308 824 310" stroke="#9A7B53" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M746 414 C724 392 696 386 678 392" stroke="#9A7B53" stroke-width="6" fill="none" stroke-linecap="round"/>
    <g fill="#78976A">
      <ellipse cx="752" cy="280" rx="60" ry="42"/>
      <ellipse cx="814" cy="308" rx="46" ry="32" transform="rotate(18 814 308)"/>
      <ellipse cx="684" cy="386" rx="44" ry="30" transform="rotate(-22 684 386)"/>
      <ellipse cx="804" cy="240" rx="40" ry="28" transform="rotate(12 804 240)"/>
      <ellipse cx="708" cy="312" rx="42" ry="30" transform="rotate(-12 708 312)"/>
    </g>
    <g fill="#8FAD78" opacity="0.9">
      <ellipse cx="774" cy="258" rx="34" ry="22"/>
      <ellipse cx="728" cy="344" rx="30" ry="20"/>
      <ellipse cx="792" cy="292" rx="28" ry="18"/>
      <ellipse cx="760" cy="226" rx="24" ry="16"/>
    </g>
    <!-- 화분 -->
    <path d="M712 556 L796 556 L784 626 Q782 638 770 638 L738 638 Q726 638 724 626 Z" fill="#DCC7A2"/>
    <path d="M712 556 L796 556 L792 576 L716 576 Z" fill="#E7D6B6"/>
  </g>

  <!-- 우드 라운지 체어 (심플, 창 앞) -->
  <g>
    <ellipse cx="1010" cy="694" rx="150" ry="26" fill="url(#shadow)"/>
    <!-- 등받이 쿠션 -->
    <path d="M905 360 q150 -30 252 16 q28 12 24 74 l-20 150 q-2 26 -28 26 l-208 0 q-26 0 -28 -26 l-20 -150 q-4 -46 26 -64 Z" fill="#F1E8D4"/>
    <path d="M922 380 q142 -26 222 14 l-10 58 q-110 -34 -206 -10 Z" fill="#E5DABF" opacity="0.85"/>
    <!-- 좌석 쿠션 -->
    <rect x="892" y="540" width="296" height="78" rx="26" fill="#EADFC8"/>
    <rect x="892" y="540" width="296" height="20" rx="10" fill="#F2E9D6"/>
    <!-- 우드 팔걸이/다리 -->
    <rect x="884" y="444" width="22" height="180" rx="10" fill="#BC8E58"/>
    <rect x="1176" y="444" width="22" height="180" rx="10" fill="#B5854F"/>
    <rect x="900" y="612" width="16" height="20" fill="#A9743F"/>
    <rect x="1166" y="612" width="16" height="20" fill="#9C6A37"/>
  </g>

  <!-- 좌측 텍스트 영역: 깨끗한 밝은 여백 (오브젝트 없음) -->
</svg>
