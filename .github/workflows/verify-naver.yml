name: verify-naver
on:
  push:
    branches: [claude/verify-naver-check]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: enumerate public URLs
        run: |
          echo "################ /sitemap.xml (실제 서빙) ################"
          curl -sS -w "\n[STATUS %{http_code} | %{content_type} | size=%{size_download}]\n" "https://gongganmarket.com/sitemap.xml"
          echo
          echo "################ /api/sitemap (동적 전체: 카테고리+글+지역) ################"
          curl -sS -w "\n[STATUS %{http_code} | %{content_type} | size=%{size_download}]\n" "https://gongganmarket.com/api/sitemap"
          echo
          echo "################ 고정 페이지 HEAD 상태 (SPA라 200 index.html 예상) ################"
          for p in "/" "/lounge" "/request" "/company" "/login" "/mypage" \
                   "/lounge/category/interior" "/lounge/category/estimate" "/lounge/category/review" \
                   "/lounge/category/company" "/lounge/category/moving"; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" "https://gongganmarket.com$p")
            echo "$code  $p"
          done
