name: verify-naver
on:
  push:
    branches: [claude/verify-naver-check]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: verify BOTH naver files (Yeti UA)
        run: |
          YETI="Mozilla/5.0 (compatible; Yeti/1.1; +http://naver.me/spd)"
          for F in \
            "naverdd7f227f04689ae77e06293315940389.html:dd7f227f04689ae77e06293315940389" \
            "naver0b2e655f5bb483edebab3e18bc7faf4712328734.html:0b2e655f5bb483edebab3e18bc7faf4712328734"; do
            FILE="${F%%:*}"; CODE="${F##*:}"
            echo "################ $FILE ################"
            curl -sS -D - -A "$YETI" "https://gongganmarket.com/$FILE" -o /tmp/body \
              -w "STATUS: HTTP %{http_code} | type=%{content_type} | size=%{size_download} | redirects=%{num_redirects}\n" \
              | grep -iE "HTTP/|content-type|content-disposition|x-vercel-cache|content-length|STATUS:"
            echo "본문: $(cat /tmp/body)"
            grep -q "$CODE" /tmp/body && echo "=> 코드 일치 ✅" || echo "=> 불일치 ❌"
            echo
          done
