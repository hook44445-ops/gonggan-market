name: verify-naver
on:
  push:
    branches: [claude/verify-naver-check]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: curl all URL variants
        run: |
          P="naverdd7f227f04689ae77e06293315940389.html"
          for U in \
            "https://gongganmarket.com/$P" \
            "https://www.gongganmarket.com/$P" \
            "http://gongganmarket.com/$P" \
            "http://www.gongganmarket.com/$P"; do
            echo "================ $U ================"
            curl -sS -o /tmp/b -w "final_url=%{url_effective}\nHTTP %{http_code} | type=%{content_type} | redirects=%{num_redirects} | size=%{size_download}\n" --max-time 30 -L "$U" 2>&1 || true
            echo "---- body ----"; cat /tmp/b; echo; echo
          done
          echo "================ Yeti UA, no-follow (네이버 봇이 보는 그대로) ================"
          curl -sS -o /tmp/y -w "HTTP %{http_code} | type=%{content_type} | redirects=%{num_redirects}\n" --max-time 30 \
            -A "Mozilla/5.0 (compatible; Yeti/1.1; +http://naver.me/spd)" "http://gongganmarket.com/$P" 2>&1 || true
          echo "---- body(yeti http, no -L) ----"; cat /tmp/y; echo
