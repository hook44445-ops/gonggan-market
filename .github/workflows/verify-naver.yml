name: verify-naver
on:
  push:
    branches: [claude/verify-naver-check]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: actual /robots.txt served in production
        run: |
          echo "################ GET https://gongganmarket.com/robots.txt ################"
          curl -sS -D - "https://gongganmarket.com/robots.txt" \
            -w "\nSTATUS: HTTP %{http_code} | type=%{content_type} | size=%{size_download}\n" \
            | grep -iE "HTTP/|content-type|x-vercel-cache|x-matched-path|STATUS:|^User-agent|^Allow|^Disallow|^Sitemap|^$" || true
          echo
          echo "################ 본문 전문 ################"
          curl -sS "https://gongganmarket.com/robots.txt"
